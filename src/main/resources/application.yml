spring:
  application:
    name: multi-tenant-notification-service
  datasource:
    url: jdbc:mysql://localhost:3306/notification_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}

server:
  port: ${SERVER_PORT:8081}

notification:
  dispatcher:
    poll-interval-ms: 3000
    batch-size: 500
    core-pool-size: 8
    max-pool-size: 16
  retry:
    max-attempts: 5
    base-backoff-seconds: 10
    max-backoff-seconds: 300